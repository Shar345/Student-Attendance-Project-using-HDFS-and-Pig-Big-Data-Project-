<!DOCTYPE html>
<html>

<head>
    <title>Student Attendance System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            margin-top: 40px;
            padding: 25px;
            width: 700px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            padding: 6px;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 8px;
            text-align: center;
            border: 1px solid #ccc;
        }

        th {
            background-color: #2c7be5;
            color: white;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .scroll-box {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 30px;
            margin-left: 280px;
        }

        button:hover {
            background-color: #218838;
        }

        td input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            display: block;
            margin: auto;
        }

        .counter {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Student Attendance System</h2>

        <form action="/submit" method="post">

            <!-- Date Selection -->
            <label>Select Date:</label><br>
            <input type="date" name="date" required>

            <br><br>

            <!-- Subject Selection -->
            <label>Select Subject/Class:</label><br>
            <select name="subject" required>
                <option value="BDA">BDA</option>
                <option value="Cloud">Cloud</option>
                <option value="NS">NS</option>
                <option value="Stats">Stats</option>
            </select>

            <br><br>

            <!-- Attendance Label -->
            <label>Mark Attendance:</label>

            <!-- Present / Absent Counter -->
            <div class="counter">
                Present: <span id="presentCount">0</span> |
                Absent: <span id="absentCount">0</span>
            </div>

            <div class="scroll-box">

                <table>

                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Present</th>
                    </tr>

                    {% for student in students %}

                    <tr>
                        <td>{{ student.rollno }}</td>
                        <td>{{ student.name }}</td>
                        <td>
                            <input type="checkbox" name="{{ student.rollno }}" class="attendanceBox">
                        </td>
                    </tr>

                    {% endfor %}

                </table>

            </div>

            <button type="submit">Submit Attendance</button>

        </form>

    </div>

    <script>

        // Get all attendance checkboxes
        let checkboxes = document.querySelectorAll(".attendanceBox");

        // Total students
        let totalStudents = checkboxes.length;

        // Set initial counts
        document.getElementById("presentCount").innerText = 0;
        document.getElementById("absentCount").innerText = totalStudents;

        // Update counter when checkbox changes
        checkboxes.forEach(function (box) {

            box.addEventListener("change", function () {

                let present = document.querySelectorAll(".attendanceBox:checked").length;
                let absent = totalStudents - present;

                document.getElementById("presentCount").innerText = present;
                document.getElementById("absentCount").innerText = absent;

            });

        });

    </script>

</body>

</html>
